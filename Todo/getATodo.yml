info:
  name: getATodo
  type: graphql
  seq: 5

graphql:
  method: POST
  url: "{{graqphQLURl}}"
  body:
    query: |-
      query GetTodo($id: Int!) {
        todo(id: $id) {
          id
          title
          description
          isDone
          deadline
          todoList { title }
        }
      }
    variables: '{ "id": 1 }'
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
