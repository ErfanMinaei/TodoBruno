info:
  name: getATodo
  type: graphql
  seq: 5

graphql:
  method: POST
  url: http://localhost:3000/graphql
  body:
    query: |-
      query GetTodo($id: Int!) {
        todo(id: $id) {
          id
          title
          description
          isDone
          deadline
          todoList { title }
        }
      }
