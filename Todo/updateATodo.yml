info:
  name: updateATodo
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{graqphQLURl}}"
  body:
    query: |-
      mutation UpdateTodo($id: Int!, $input: UpdateTodoInput!) {
        updateTodo(id: $id, input: $input) {
          id
          title
          isDone
        }
      }
    variables: '{ "id": 3 , "input": { "isDone": true } }'
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
