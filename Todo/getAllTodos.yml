info:
  name: getAllTodos
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{graqphQLURl}}"
  body:
    query: |-
      query GetTodos($todoListId: Int!) {
        todos(todoListId: $todoListId) {
          id
          title
          description
          isDone
          deadline
          attachments {
            id
            originalName
            mimeType
            size
          }
        }
      }
    variables: '{ "todoListId": 6 }'
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
