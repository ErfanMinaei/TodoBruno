info:
  name: getAllTodos
  type: graphql
  seq: 4

graphql:
  method: POST
  url: http://localhost:3000/graphql
  body:
    query: |-
      query GetTodos($todoListId: Int!) {
        todos(todoListId: $todoListId) {
          id
          title
          description
          isDone
          deadline
          attachments {
            id
            originalName
            mimeType
            size
          }
        }
      }
    variables: '{ "todoListId": 6 }'
