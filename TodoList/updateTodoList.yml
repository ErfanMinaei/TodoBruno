info:
  name: updateTodoList
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{graqphQLURl}}"
  body:
    query: |-
      mutation UpdateTodoList($id: Int!, $input: UpdateTodoListInput!) {
        updateTodoList(id: $id, input: $input) {
          id
          title
        }
      }
    variables: '{ "id": 4, "input": { "title": "updatedTodolist" } }'
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
