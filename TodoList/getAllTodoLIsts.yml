info:
  name: getAllTodoLIsts
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{graqphQLURl}}"
  body:
    query: |-
      query GetMyTodoLists {
        todoLists {
          id
          title
          createdAt
          todos { id title isDone }
        }
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
