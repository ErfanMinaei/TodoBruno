info:
  name: createTodolist
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{graqphQLURl}}"
  body:
    query: |-
      mutation CreateTodoList($input: CreateTodoListInput!) {
        createTodoList(input: $input) {
          id
          title
        }
      }
    variables: '{ "input": { "title": "todolist1" } }'
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
