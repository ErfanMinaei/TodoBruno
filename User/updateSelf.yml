info:
  name: updateSelf
  type: graphql
  seq: 6

graphql:
  method: POST
  url: "{{graqphQLURl}}"
  body:
    query: |-
      mutation UpdateSelf($input: UpdateUserInput!) {
        updateSelf(input: $input) {
          id
          username
          firstName
          lastName
        }
      }
    variables: '{ "input": { "firstName": "updateduser","username":"passIsuser11", "currentPassword": "user1", "newPassword": "user11" } }'
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
