info:
  name: register
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{graqphQLURl}}"
  body:
    query: |-
      mutation Register($input: RegisterUserInput!) {
        register(input: $input) {
          accessToken
          refreshToken
          user { id username roles }
        }
      }
    variables: '{ "input": { "firstName": "user", "lastName": "1", "username": "passIsuser1", "password": "user1" } }'
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
