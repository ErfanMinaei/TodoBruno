info:
  name: refresh
  type: graphql
  seq: 3

graphql:
  method: POST
  url: http://localhost:3000/graphql
  body:
    query: |-
      mutation Refresh($refreshToken: String!) {
        refresh(refreshToken: $refreshToken) {
          accessToken
          refreshToken
        }
      }
    variables: '{ "refreshToken": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOjYsInVzZXJuYW1lIjoicGFzc0lzdXNlcjIiLCJ0eXBlIjoicmVmcmVzaCIsImlhdCI6MTc4MTQzNTQ4NCwiZXhwIjoxNzg0MDI3NDg0fQ.LeZRfafFIu-z-tSPGTMY2vCn4TXbefO0kkubTiKogZA" }'
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
