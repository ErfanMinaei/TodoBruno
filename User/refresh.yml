info:
  name: refresh
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{graqphQLURl}}"
  body:
    query: |-
      mutation Refresh($refreshToken: String!) {
        refresh(refreshToken: $refreshToken) {
          accessToken
          refreshToken
        }
      }
    variables: '{ "refreshToken": "{{refreshToken}}" }'
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
