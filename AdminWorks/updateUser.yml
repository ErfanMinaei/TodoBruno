info:
  name: updateUser
  type: graphql
  seq: 9

graphql:
  method: POST
  url: "{{graqphQLURl}}"
  body:
    query: |-
      mutation UpdateUser($userId: Int!, $input: UpdateUserByAdminInput!) {
        updateUser(userId: $userId, input: $input) {
          id
          username
          firstName
        }
      }
    variables: '{ "userId": 3, "input": { "firstName": "updatednameforUser111", "username":"passIsuser111","newPassword": "user111" } }'
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
