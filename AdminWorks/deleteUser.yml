info:
  name: deleteUser
  type: graphql
  seq: 10

graphql:
  method: POST
  url: "{{graqphQLURl}}"
  body:
    query: |-
      mutation DeleteUser($userId: Int!) {
        deleteUser(userId: $userId)
      }
    variables: '{ "userId": 4 }'
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
