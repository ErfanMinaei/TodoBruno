info:
  name: adminCreateTodo
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{graqphQLURl}}"
  body:
    query: |-
      mutation AdminCreateTodo($input: CreateTodoInput!) {
        adminCreateTodo(input: $input) { id title }
      }
    variables: |-
      {
        "input": {
          "title": "Example admin todo",
          "description": "This is a todo created by an admin",
          "deadline": "2026-12-31T23:59:59Z",
          "todoListId": 7
        }
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
