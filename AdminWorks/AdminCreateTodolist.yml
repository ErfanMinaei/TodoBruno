info:
  name: AdminCreateTodolist
  type: graphql
  seq: 5

graphql:
  method: POST
  url: "{{graqphQLURl}}"
  body:
    query: |-
      mutation AdminCreateTodoList($userId: Int!, $input: CreateTodoListInput!) {
        adminCreateTodoList(userId: $userId, input: $input) { id title }
      }
    variables: '{ "userId": 3, "input": { "title": "Project alpha" } }'
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
