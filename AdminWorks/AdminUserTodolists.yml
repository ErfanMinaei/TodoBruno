info:
  name: AdminUserTodolists
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{graqphQLURl}}"
  body:
    query: |-
      query GetUserTodoLists($userId: Int!) {
        userTodoLists(userId: $userId) {
          id
          title
          user { username }
          todos { id }
        }
      }
    variables: '{ "userId": 3 }'
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
