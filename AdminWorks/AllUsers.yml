info:
  name: AllUsers
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{graqphQLURl}}"
  body:
    query: |-
      query GetAllUsers {
        allUsers {
          id
          username
          firstName
          lastName
          roles
        }
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
