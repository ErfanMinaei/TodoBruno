      mutation CreateAdmin($input: RegisterUserInput!) {
        createAdmin(input: $input) {
          id
          username
          roles
        }
      }
    variables: '{ "input": { "firstName": "amdin", "username": "passIsadmin1", "password": "admin1" } }'
